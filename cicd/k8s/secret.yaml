apiVersion: v1
kind: Secret
metadata:
  name: adservice-secrets
  namespace: adservice
  labels:
    app: adservice
type: Opaque
data:
  # These values should be base64 encoded
  # Use: echo -n 'your-value' | base64
  DATABASE_URL: { { DATABASE_URL } }
  JWT_SECRET: { { JWT_SECRET } }
  SESSION_SECRET: { { SESSION_SECRET } }
  REDIS_URL: { { REDIS_URL } }
  API_KEY: { { API_KEY } }