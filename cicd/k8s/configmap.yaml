apiVersion: v1
kind: ConfigMap
metadata:
  name: adservice-config
  namespace: adservice
  labels:
    app: adservice
data:
  # Application configuration
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  PORT: "3000"

  # Feature flags
  FEATURE_ENABLE_RECOMMENDATIONS: "true"
  FEATURE_ENABLE_CHAT: "true"
  FEATURE_ENABLE_SEARCH: "true"

  # Cache settings
  REDIS_TTL: "3600"
  CACHE_ENABLED: "true"

  # Pagination
  DEFAULT_PAGE_SIZE: "20"
  MAX_PAGE_SIZE: "100"

  # Upload settings
  MAX_UPLOAD_SIZE: "10MB"
  ALLOWED_FILE_TYPES: "image/jpeg,image/png,image/webp"

  # Timeout settings
  REQUEST_TIMEOUT: "30000"
  DATABASE_TIMEOUT: "5000"