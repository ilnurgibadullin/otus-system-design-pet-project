---
stages:
  - build
  - test
  - sonar
  - security checks
  - deploy
  - cleanup

variables:
  # Docker
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  CONTAINER_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
  LATEST_IMAGE: $CI_REGISTRY_IMAGE:latest

  # Kubernetes
  KUBE_NAMESPACE: ${KUBERNETES_NAMESPACE:-adservice-$CI_ENVIRONMENT_SLUG}
  HELM_RELEASE_NAME: ${HELM_RELEASE_NAME:-adservice}

  # Testing
  TEST_IMAGE: $CI_REGISTRY_IMAGE:test-$CI_COMMIT_SHA

# Кэширование зависимостей
cache:
  paths:
    - .m2/repository/
    - .gradle/
    - node_modules/
    - vendor/

default:
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  before_script:
    - docker info

# ==================== BUILD STAGE ====================

build-app-image:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker info
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" "$CI_REGISTRY" --password-stdin
  script:
    - echo "Building application image..."
    - docker build
      --target production
      --build-arg GIT_COMMIT=$CI_COMMIT_SHA
      --build-arg BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
      -t $CONTAINER_IMAGE .
    - docker push $CONTAINER_IMAGE
    - |
      if [[ "$CI_COMMIT_BRANCH" == "$CI_DEFAULT_BRANCH" ]]; then
        docker tag $CONTAINER_IMAGE $LATEST_IMAGE
        docker push $LATEST_IMAGE
      fi
  after_script:
    - docker logout
  artifacts:
    reports:
      dotenv: build.env
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - "**/*.{py,java,go,js,ts}"
        - "Dockerfile"
        - "requirements.txt"
        - "package.json"
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  tags:
    - docker

# ==================== TEST STAGE ====================

integration-tests:
  stage: test
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    TEST_CONTAINERS_RYUK_DISABLED: "true"
  before_script:
    - apk add --no-cache curl jq openjdk11 bash
    - docker info
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" "$CI_REGISTRY" --password-stdin
  script:
    - echo "Running integration tests..."
    # Сборка тестового образа
    - docker build
      --target test
      -t $TEST_IMAGE .
    # Запуск тестов в контейнере
    - docker run --rm
      -e CI=true
      -e DATABASE_URL=postgresql://test:test@postgres:5432/test_db
      --network ci-network
      $TEST_IMAGE
    # Альтернативно: запуск с docker-compose
    - |
      cat > docker-compose.test.yml << EOF
      version: '3.8'
      services:
        app-test:
          image: $TEST_IMAGE
          environment:
            - DATABASE_URL=postgresql://postgres:postgres@db:5432/test_db
            - CI=true
          depends_on:
            - db
        db:
          image: postgres:14
          environment:
            - POSTGRES_DB=test_db
            - POSTGRES_USER=postgres
            - POSTGRES_PASSWORD=postgres
          healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 10s
            timeout: 5s
            retries: 5
      EOF
    - docker-compose -f docker-compose.test.yml up --exit-code-from app-test
  after_script:
    - docker-compose -f docker-compose.test.yml down -v || true
    - docker logout
  artifacts:
    reports:
      junit: test-results/**/*.xml
    paths:
      - coverage/
      - test-results/
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  tags:
    - docker

security-scan:
  stage: test
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - apk add --no-cache curl
    - docker info
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" "$CI_REGISTRY" --password-stdin
  script:
    - echo "Running security scan..."
    - docker run --rm
      -v /var/run/docker.sock:/var/run/docker.sock
      aquasec/trivy:latest
      image --severity HIGH,CRITICAL
      --format table
      --output trivy-report.txt
      $CONTAINER_IMAGE
    - |
      if [ -s trivy-report.txt ]; then
        echo "Security vulnerabilities found:"
        cat trivy-report.txt
        exit 1
      else
        echo "No critical/high severity vulnerabilities found"
      fi
  allow_failure: true
  artifacts:
    paths:
      - trivy-report.txt
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  tags:
    - docker

# ==================== DEPLOY STAGE ====================

deploy-staging:
  stage: deploy
  image:
    name: bitnami/kubectl:latest
    entrypoint: ['']
  before_script:
    - echo "$KUBE_CONFIG" | base64 -d > kubeconfig.yaml
    - export KUBECONFIG=kubeconfig.yaml
    - kubectl cluster-info
  script:
    - echo "Deploying to staging environment..."
    # Создание namespace если не существует
    - |
      kubectl create namespace $KUBE_NAMESPACE --dry-run=client -o yaml | kubectl apply -f -
    # Деплой через kubectl
    - |
      cat > deployment.yaml << EOF
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: adservice-app
        namespace: $KUBE_NAMESPACE
      spec:
        replicas: 2
        selector:
          matchLabels:
            app: adservice
        template:
          metadata:
            labels:
              app: adservice
          spec:
            containers:
            - name: app
              image: $CONTAINER_IMAGE
              ports:
              - containerPort: 8000
              env:
              - name: DATABASE_URL
                valueFrom:
                  secretKeyRef:
                    name: adservice-secrets
                    key: database-url
              readinessProbe:
                httpGet:
                  path: /health
                  port: 8000
                initialDelaySeconds: 30
                periodSeconds: 10
              livenessProbe:
                httpGet:
                  path: /health
                  port: 8000
                initialDelaySeconds: 60
                periodSeconds: 30
      ---
      apiVersion: v1
      kind: Service
      metadata:
        name: adservice-service
        namespace: $KUBE_NAMESPACE
      spec:
        selector:
          app: adservice
        ports:
        - port: 80
          targetPort: 8000
        type: ClusterIP
      EOF
    - kubectl apply -f deployment.yaml
    # Создание секретов
    - |
      kubectl create secret generic adservice-secrets \
        --namespace=$KUBE_NAMESPACE \
        --from-literal=database-url="postgresql://$DB_USER:$DB_PASSWORD@$DB_HOST:5432/$DB_NAME" \
        --from-literal=jwt-secret="$JWT_SECRET" \
        --dry-run=client -o yaml | kubectl apply -f -
    # Проверка деплоя
    - kubectl rollout status deployment/adservice-app --namespace=$KUBE_NAMESPACE --timeout=300s
  environment:
    name: staging
    url: https://staging.adservice.example.com
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
  tags:
    - kubernetes

deploy-production:
  stage: deploy
  image:
    name: bitnami/kubectl:latest
    entrypoint: ['']
  before_script:
    - echo "$KUBE_CONFIG_PROD" | base64 -d > kubeconfig-prod.yaml
    - export KUBECONFIG=kubeconfig-prod.yaml
    - kubectl cluster-info
  script:
    - echo "Deploying to production environment..."
    - |
      kubectl create namespace $KUBE_NAMESPACE --dry-run=client -o yaml | kubectl apply -f -
    # Использование Helm для продакшн деплоя
    - |
      helm upgrade --install $HELM_RELEASE_NAME ./helm/adservice \
        --namespace $KUBE_NAMESPACE \
        --set image.repository=$CI_REGISTRY_IMAGE \
        --set image.tag=$CI_COMMIT_SHA \
        --set replicaCount=3 \
        --set ingress.enabled=true \
        --set ingress.hosts[0].host=adservice.example.com \
        --set ingress.hosts[0].paths[0].path=/ \
        --set ingress.tls[0].secretName=adservice-tls \
        --set ingress.tls[0].hosts[0]=adservice.example.com \
        --atomic \
        --timeout 300s
    # Проверка состояния
    - kubectl get pods,svc,ingress -n $KUBE_NAMESPACE
  environment:
    name: production
    url: https://adservice.example.com
  when: manual
  allow_failure: false
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
  tags:
    - kubernetes

# ==================== CLEANUP STAGE ====================

cleanup-test-images:
  stage: cleanup
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" "$CI_REGISTRY" --password-stdin
  script:
    - echo "Cleaning up test images..."
    - docker rmi $TEST_IMAGE || true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
  tags:
    - docker

# ==================== HELPER JOBS ====================

code-quality:
  stage: test
  image: python:3.11
  before_script:
    - pip install flake8 pytest black
  script:
    - echo "Running code quality checks..."
    - flake8 . --max-line-length=120 --exclude=.git,__pycache__,venv
    - black --check .
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  tags:
    - python

.dependency_scanning:
  stage: test
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - apk add --no-cache curl
  script:
    - echo "Scanning dependencies for vulnerabilities..."
    - |
      curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
    - grype dir:. --fail-on high
  allow_failure: true
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

include:
  - template: Security/Dependency-Scanning.gitlab-ci.yml
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

# ==================== NOTIFICATION JOBS ====================

notify-success:
  stage: .post
  image: curlimages/curl:latest
  script:
    - |
      curl -X POST "$SLACK_WEBHOOK" \
        -H "Content-Type: application/json" \
        -d '{
          "text": "Pipeline successful for *'$CI_PROJECT_NAME'*",
          "attachments": [
            {
              "color": "good",
              "fields": [
                {"title": "Branch", "value": "'$CI_COMMIT_BRANCH'", "short": true},
                {"title": "Commit", "value": "'$CI_COMMIT_SHORT_SHA'", "short": true},
                {"title": "Pipeline", "value": "<'$CI_PIPELINE_URL'|View Pipeline>", "short": false}
              ]
            }
          ]
        }'
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  when: on_success

notify-failure:
  stage: .post
  image: curlimages/curl:latest
  script:
    - |
      curl -X POST "$SLACK_WEBHOOK" \
        -H "Content-Type: application/json" \
        -d '{
          "text": "Pipeline failed for *'$CI_PROJECT_NAME'*",
          "attachments": [
            {
              "color": "danger",
              "fields": [
                {"title": "Branch", "value": "'$CI_COMMIT_BRANCH'", "short": true},
                {"title": "Commit", "value": "'$CI_COMMIT_SHORT_SHA'", "short": true},
                {"title": "Pipeline", "value": "<'$CI_PIPELINE_URL'|View Pipeline>", "short": false}
              ]
            }
          ]
        }'
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  when: on_failure